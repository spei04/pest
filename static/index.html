<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PestPro Field Assistant</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    /* ── Fonts ───────────────────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700&display=swap');

    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ──────────────────────────────────────────────── */
    :root {
      --green-900: #1A3C28;
      --green-800: #1F4D30;
      --green-700: #276140;
      --green-500: #3A8C5C;
      --green-300: #7DBD96;
      --green-100: #E6F4EC;
      --amber:     #D4891A;
      --amber-light: #FEF3DC;
      --cream:     #F6F1E9;
      --paper:     #FDFAF5;
      --ink:       #1C2B1E;
      --muted:     #6B7C6F;
      --border:    #D9E6DC;
      --shadow:    0 2px 12px rgba(26,60,40,.10);
    }

    /* ── Layout ──────────────────────────────────────────────── */
    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--cream);
      /* Subtle field-notebook grid lines */
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 28px 28px;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      background: var(--green-900);
      color: #fff;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      position: relative;
      z-index: 10;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Merriweather', Georgia, serif;
      font-size: 16px;
      letter-spacing: .3px;
    }

    .header-text p {
      font-size: 11px;
      opacity: .65;
      margin-top: 1px;
    }

    .header-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      background: var(--green-700);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    /* ── Chat window ─────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* ── Message rows ────────────────────────────────────────── */
    .msg-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      max-width: 780px;
      width: 100%;
      animation: fadeUp .25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user  { margin-left: auto; flex-direction: row-reverse; }
    .msg-row.bot   { margin-right: auto; }

    /* ── Avatars ─────────────────────────────────────────────── */
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .avatar.bot-avatar {
      background: var(--green-900);
      /* The bug SVG is drawn below as inline content */
    }

    .avatar.user-avatar {
      background: var(--green-700);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
    }

    /* ── Bubbles ─────────────────────────────────────────────── */
    .bubble {
      padding: 13px 16px;
      border-radius: 14px;
      line-height: 1.65;
      font-size: 14px;
      max-width: 640px;
    }

    .msg-row.bot .bubble {
      background: var(--paper);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-top-left-radius: 4px;
    }

    /* ── Response formatting ─────────────────────────────────── */
    .bubble p {
      margin: 0 0 10px 0;
    }
    .bubble p:last-child { margin-bottom: 0; }

    .bubble ol, .bubble ul {
      margin: 6px 0 10px 0;
      padding-left: 20px;
    }
    .bubble li {
      margin-bottom: 5px;
      line-height: 1.6;
    }

    .section-label {
      font-weight: 600;
      color: var(--green-800);
      margin: 10px 0 4px 0;
      font-size: 13px;
      letter-spacing: .2px;
    }

    .inline-num, .inline-bullet {
      padding: 2px 0 2px 4px;
      line-height: 1.65;
    }

    .inline-bullet::before {
      content: "•";
      color: var(--green-500);
      font-weight: 700;
      margin-right: 6px;
    }

    .msg-row.user .bubble {
      background: var(--green-800);
      color: #e8f5ed;
      border-top-right-radius: 4px;
    }

    /* ── Sources ─────────────────────────────────────────────── */
    .sources {
      margin-top: 10px;
    }

    .sources-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0;
      font-family: inherit;
    }

    .sources-toggle:hover { color: var(--green-700); }

    .sources-toggle svg {
      transition: transform .2s;
    }

    .sources-toggle.open svg {
      transform: rotate(90deg);
    }

    .sources-list {
      display: none;
      flex-direction: column;
      gap: 5px;
      margin-top: 8px;
    }

    .sources-list.open { display: flex; }

    .source-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: inherit;
      background: var(--amber-light);
      border: 1px solid #e8d0a0;
      color: #7a4f0c;
      border-radius: 6px;
      padding: 4px 9px;
      width: fit-content;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      transition: background .12s, border-color .12s;
    }

    .source-chip:hover {
      background: #fde8b0;
      border-color: #c8a060;
    }

    /* ── Thinking indicator ──────────────────────────────────── */
    .thinking {
      display: flex;
      gap: 5px;
      padding: 8px 4px;
      align-items: center;
    }

    .thinking span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green-500);
      animation: bounce 1.1s infinite ease-in-out;
    }

    .thinking span:nth-child(2) { animation-delay: .18s; }
    .thinking span:nth-child(3) { animation-delay: .36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .5; }
      40%           { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Input bar ───────────────────────────────────────────── */
    #input-bar {
      background: var(--paper);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #question {
      flex: 1;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      resize: none;
      background: var(--cream);
      color: var(--ink);
      outline: none;
      min-height: 44px;
      max-height: 140px;
      transition: border-color .15s;
    }

    #question:focus { border-color: var(--green-500); }

    #question::placeholder { color: var(--muted); }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: none;
      background: var(--green-800);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }

    #send-btn:hover  { background: var(--green-700); }
    #send-btn:active { transform: scale(.95); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* ── Welcome card ────────────────────────────────────────── */
    .welcome-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      max-width: 480px;
      margin: auto;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .welcome-card .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .welcome-card h2 {
      font-family: 'Merriweather', serif;
      font-size: 17px;
      color: var(--green-900);
      margin-bottom: 8px;
    }

    .welcome-card p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .sample-questions {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-top: 16px;
    }

    .sample-q {
      text-align: left;
      background: var(--green-100);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12.5px;
      color: var(--green-800);
      cursor: pointer;
      transition: background .12s;
      font-family: inherit;
    }

    .sample-q:hover { background: #d1eadb; }

    /* ── Error ───────────────────────────────────────────────── */
    .error-bubble {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      color: #9b2c2c;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
    }

    /* ── Scrollbar ───────────────────────────────────────────── */
    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Snippet modal ───────────────────────────────────────── */
    #modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20, 40, 25, .45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #modal-backdrop.open { display: flex; }

    #modal {
      background: var(--paper);
      border-radius: 16px;
      width: 100%;
      max-width: 640px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: modalIn .2s ease;
      overflow: hidden;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(12px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    #modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .modal-file-icon {
      width: 36px;
      height: 36px;
      background: var(--green-100);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #modal-filename {
      font-weight: 600;
      font-size: 14px;
      color: var(--ink);
      line-height: 1.3;
    }

    #modal-filepath {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      word-break: break-all;
    }

    #modal-close {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 2px;
      border-radius: 6px;
      display: flex;
      flex-shrink: 0;
    }

    #modal-close:hover { background: var(--green-100); color: var(--ink); }

    #modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    #modal-snippet {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--ink);
      white-space: pre-wrap;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      border-left: 3px solid var(--green-500);
    }
  </style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────── -->
<header>
  <!-- Stylized bug SVG logo -->
  <svg class="header-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Body -->
    <ellipse cx="20" cy="22" rx="7" ry="9" fill="#7DBD96"/>
    <!-- Head -->
    <circle cx="20" cy="13" r="5" fill="#7DBD96"/>
    <!-- Eyes -->
    <circle cx="18" cy="12" r="1.4" fill="#1A3C28"/>
    <circle cx="22" cy="12" r="1.4" fill="#1A3C28"/>
    <!-- Eye shine -->
    <circle cx="18.5" cy="11.4" r=".5" fill="white"/>
    <circle cx="22.5" cy="11.4" r=".5" fill="white"/>
    <!-- Antennae -->
    <line x1="18" y1="9" x2="13" y2="4" stroke="#7DBD96" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="13" cy="4" r="1.5" fill="#3A8C5C"/>
    <line x1="22" y1="9" x2="27" y2="4" stroke="#7DBD96" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="27" cy="4" r="1.5" fill="#3A8C5C"/>
    <!-- Legs left -->
    <line x1="14" y1="20" x2="8"  y2="17" stroke="#3A8C5C" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="13" y1="23" x2="7"  y2="22" stroke="#3A8C5C" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="14" y1="26" x2="8"  y2="27" stroke="#3A8C5C" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Legs right -->
    <line x1="26" y1="20" x2="32" y2="17" stroke="#3A8C5C" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="27" y1="23" x2="33" y2="22" stroke="#3A8C5C" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="26" y1="26" x2="32" y2="27" stroke="#3A8C5C" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Wing line -->
    <line x1="20" y1="14" x2="20" y2="30" stroke="#1A3C28" stroke-width="1" stroke-dasharray="2 2" opacity=".4"/>
  </svg>

  <div class="header-text">
    <h1>PestPro Field Assistant</h1>
    <p>Pest Management Systems, Inc. — Internal Knowledge Base</p>
  </div>
  <div class="header-badge">AI Powered</div>
</header>

<!-- ── Chat ─────────────────────────────────────────────────── -->
<div id="chat">
  <!-- Welcome card shown until first message -->
  <div id="welcome" class="welcome-card">
    <div class="icon">🔍</div>
    <h2>What can I help you find today?</h2>
    <p>Ask me about treatment protocols, inspection procedures, regulatory requirements, pest identification, or any other company knowledge.</p>
    <div class="sample-questions">
      <button class="sample-q" onclick="fillQuestion(this)">What is the treatment protocol for German cockroaches?</button>
      <button class="sample-q" onclick="fillQuestion(this)">What are the inspection steps for a residential crawlspace?</button>
      <button class="sample-q" onclick="fillQuestion(this)">What are the North Carolina regulatory requirements for pesticide application?</button>
      <button class="sample-q" onclick="fillQuestion(this)">How should a bed bug conventional treatment be documented?</button>
    </div>
  </div>
</div>

<!-- ── Input bar ─────────────────────────────────────────────── -->
<div id="input-bar">
  <textarea
    id="question"
    placeholder="Ask a question about procedures, pests, regulations…"
    rows="1"
  ></textarea>
  <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
  const chatEl    = document.getElementById('chat');
  const inputEl   = document.getElementById('question');
  const sendBtn   = document.getElementById('send-btn');
  const welcomeEl = document.getElementById('welcome');
  let   busy      = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function fillQuestion(btn) {
    inputEl.value = btn.textContent.trim();
    inputEl.dispatchEvent(new Event('input'));
    inputEl.focus();
  }

  function bugAvatar() {
    return `<div class="avatar bot-avatar">
      <svg width="20" height="20" viewBox="0 0 40 40" fill="none">
        <ellipse cx="20" cy="23" rx="7" ry="8" fill="#7DBD96"/>
        <circle cx="20" cy="14" r="5" fill="#7DBD96"/>
        <circle cx="18" cy="13" r="1.3" fill="#1A3C28"/>
        <circle cx="22" cy="13" r="1.3" fill="#1A3C28"/>
        <circle cx="18.4" cy="12.4" r=".45" fill="white"/>
        <circle cx="22.4" cy="12.4" r=".45" fill="white"/>
        <line x1="18" y1="10" x2="14" y2="6" stroke="#7DBD96" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="14" cy="6" r="1.4" fill="#3A8C5C"/>
        <line x1="22" y1="10" x2="26" y2="6" stroke="#7DBD96" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="26" cy="6" r="1.4" fill="#3A8C5C"/>
        <line x1="14" y1="21" x2="9" y2="18" stroke="#3A8C5C" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="13" y1="24" x2="8" y2="23" stroke="#3A8C5C" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="26" y1="21" x2="31" y2="18" stroke="#3A8C5C" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="27" y1="24" x2="32" y2="23" stroke="#3A8C5C" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>`;
  }

  function appendMessage(role, text, citations = []) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    if (role === 'bot') {
      let sourcesHtml = '';
      if (citations.length) {
        const chips = citations.map((c, i) => {
          const name = c.source.split('/').pop();
          return `<button class="source-chip" onclick="openSnippet(${i})" title="View cited passage">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            ${escapeHtml(name)}
          </button>`;
        }).join('');

        sourcesHtml = `<div class="sources">
          <button class="sources-toggle" onclick="toggleSources(this)">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            ${citations.length} source${citations.length > 1 ? 's' : ''} — click to view passage
          </button>
          <div class="sources-list">${chips}</div>
        </div>`;
      }

      row.innerHTML = `
        ${bugAvatar()}
        <div>
          <div class="bubble">${formatText(text)}</div>
          ${sourcesHtml}
        </div>`;

      // Attach citation data to chips so openSnippet can read them
      if (citations.length) {
        const chipEls = row.querySelectorAll('.source-chip');
        chipEls.forEach((el, i) => {
          el.dataset.source  = citations[i].source;
          el.dataset.snippet = citations[i].snippet;
          el.onclick = () => openSnippet(el.dataset.source, el.dataset.snippet);
        });
      }
    } else {
      row.innerHTML = `
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="avatar user-avatar">You</div>`;
    }

    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return row;
  }

  function appendThinking() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'thinking-row';
    row.innerHTML = `
      ${bugAvatar()}
      <div class="bubble">
        <div class="thinking"><span></span><span></span><span></span></div>
      </div>`;
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinking-row');
    if (el) el.remove();
  }

  function toggleSources(btn) {
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('open');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatText(raw) {
    const paragraphs = raw.split(/\n{2,}/);
    const html = paragraphs.map(para => {
      const lines = para.split('\n').map(l => l.trimEnd());

      // Pure numbered list block
      if (lines.length > 0 && lines.every(l => /^\d+\.\s/.test(l) || l === '')) {
        const items = lines.filter(l => l).map(l =>
          `<li>${escapeHtml(l.replace(/^\d+\.\s+/, ''))}</li>`
        ).join('');
        return `<ol>${items}</ol>`;
      }

      // Pure bullet list block
      if (lines.length > 0 && lines.every(l => /^-\s/.test(l) || l === '')) {
        const items = lines.filter(l => l).map(l =>
          `<li>${escapeHtml(l.replace(/^-\s+/, ''))}</li>`
        ).join('');
        return `<ul>${items}</ul>`;
      }

      // Mixed or prose block — render line by line
      const rendered = lines.map(line => {
        if (!line) return '';
        if (/^\d+\.\s/.test(line))
          return `<div class="inline-num">${escapeHtml(line)}</div>`;
        if (/^-\s/.test(line))
          return `<div class="inline-bullet">${escapeHtml(line.replace(/^-\s+/, ''))}</div>`;
        if (/^[A-Z][^:a-z]{0,40}:\s*$/.test(line))
          return `<div class="section-label">${escapeHtml(line.replace(/:$/, ''))}</div>`;
        return escapeHtml(line);
      }).filter(l => l !== '').join('<br>');

      return rendered ? `<p>${rendered}</p>` : '';
    }).filter(Boolean).join('');

    return html;
  }

  async function sendMessage() {
    const question = inputEl.value.trim();
    if (!question || busy) return;

    // Hide welcome card on first message
    if (welcomeEl) welcomeEl.remove();

    busy = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMessage('user', question);
    appendThinking();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });

      removeThinking();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
        const row = document.createElement('div');
        row.className = 'msg-row bot';
        row.innerHTML = `${bugAvatar()}<div class="error-bubble">⚠️ ${escapeHtml(err.detail ?? 'Something went wrong.')}</div>`;
        chatEl.appendChild(row);
      } else {
        const data = await res.json();
        appendMessage('bot', data.answer, data.citations ?? []);
      }
    } catch (e) {
      removeThinking();
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.innerHTML = `${bugAvatar()}<div class="error-bubble">⚠️ Could not reach the server. Is the backend running?</div>`;
      chatEl.appendChild(row);
    }

    chatEl.scrollTop = chatEl.scrollHeight;
    busy = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  // ── Snippet modal ──────────────────────────────────────────

  function openSnippet(source, snippet) {
    const parts = source.split('/');
    const filename = parts.pop();
    const folder = parts.join(' / ') || 'sources';

    document.getElementById('modal-filename').textContent = filename;
    document.getElementById('modal-filepath').textContent = folder;
    document.getElementById('modal-snippet').textContent = snippet;
    document.getElementById('modal-backdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
</script>

          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>

        </svg>

      <div>
